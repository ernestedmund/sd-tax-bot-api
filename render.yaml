services:
  - type: web
    name: sd-tax-bot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # means: set this manually in Render dashboard, not in this file
